<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro — Método Base</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/styles-auth.css?v=20260402" />
  <style>
    /* Registration-specific overrides */
    body { overflow: auto; }
    .registro-wrapper {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 40px 24px; position: relative;
    }
    .bg-depth {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(circle at 25% 35%, rgba(45, 212, 191, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 75% 65%, rgba(251, 191, 36, 0.03) 0%, transparent 45%);
    }
    .registro-card {
      position: relative; z-index: 1;
      width: 100%; max-width: 520px;
      background: rgba(22, 22, 31, 0.85);
      border: 1px solid var(--border-glass);
      border-radius: 20px;
      backdrop-filter: blur(16px);
      padding: 40px 36px;
    }
    .registro-header { text-align: center; margin-bottom: 28px; }
    .registro-title {
      font-size: 1.9rem; font-weight: 800; color: var(--text-primary);
      margin-bottom: 4px;
    }
    .registro-subtitle { color: var(--text-secondary); font-size: .9rem; }

    .tipo-row { display: flex; gap: 10px; margin-bottom: 24px; }
    .tipo-btn {
      flex: 1; padding: 10px; border-radius: 8px; font-size: .85rem; font-weight: 600;
      cursor: pointer; transition: all .25s;
      border: 2px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03); color: var(--text-muted);
      font-family: inherit;
    }
    .tipo-btn.active-gym {
      border-color: rgba(251, 191, 36, 0.35); color: var(--auth-accent);
      background: rgba(251, 191, 36, 0.06);
    }
    .tipo-btn.active-usuario {
      border-color: rgba(45, 212, 191, 0.4); color: var(--accent-purple);
      background: rgba(45, 212, 191, 0.06);
    }
    .tipo-btn:focus-visible {
      outline: 2px solid var(--auth-accent); outline-offset: 2px;
    }

    .name-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .success-msg {
      background: rgba(16,185,129,.08); border: 1px solid rgba(16,185,129,.25);
      border-radius: 8px; padding: 10px 14px; color: var(--accent-green); font-size: .85rem;
      display: none; margin-bottom: 16px;
    }
    .security-note {
      background: rgba(251,191,36,.03); border: 1px solid rgba(251,191,36,.08);
      border-radius: 8px; padding: 12px; margin-bottom: 24px;
      font-size: .8rem; color: var(--text-secondary);
    }
    .footer-link { text-align: center; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border-subtle); }
    .footer-link p { color: var(--text-muted); font-size: .83rem; }
    .footer-link a {
      color: var(--auth-accent); font-weight: 600; text-decoration: none; transition: color .2s;
    }
    .footer-link a:hover { color: var(--accent-purple); }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeInUp .45s ease both; }

    @media (max-width: 540px) {
      .name-grid { grid-template-columns: 1fr; }
      .registro-card { padding: 28px 20px; }
    }
  </style>
</head>
<body>
  <div class="bg-depth"></div>

  <div class="registro-wrapper">
    <div class="registro-card fade-in">
      <a href="/" class="back-link" style="margin-bottom:24px;">← Volver al inicio</a>

      <div class="registro-header">
        <h1 class="registro-title">Crear Cuenta</h1>
        <p class="registro-subtitle">Únete al sistema nutricional</p>
      </div>

      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <!-- Account type selector -->
      <div>
        <label class="input-label">TIPO DE CUENTA</label>
        <div class="tipo-row">
          <button type="button" class="tipo-btn" id="btnGym">
            🏢 Socio Comercial (Gym)
          </button>
          <button type="button" class="tipo-btn active-usuario" id="btnUsuario">
            👤 Usuario Individual
          </button>
        </div>
      </div>

      <form id="registroForm" novalidate>
        <input type="hidden" name="tipo" id="campoTipo" value="usuario" />

        <div class="name-grid" style="margin-bottom:16px;">
          <div class="input-group" style="margin-bottom:0;">
            <label class="input-label">NOMBRE *</label>
            <input type="text" name="nombre" class="input-field" placeholder="Juan" required autocomplete="given-name" />
          </div>
          <div class="input-group" style="margin-bottom:0;">
            <label class="input-label">APELLIDO</label>
            <input type="text" name="apellido" class="input-field" placeholder="Pérez" autocomplete="family-name" />
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">CORREO ELECTRÓNICO *</label>
          <input type="email" name="email" class="input-field" placeholder="tu@email.com" required autocomplete="email" />
        </div>

        <div class="input-group">
          <label class="input-label">CONTRASEÑA * (mín. 6 caracteres)</label>
          <input type="password" name="password" id="pwdField" class="input-field" placeholder="••••••••" required autocomplete="new-password" />
        </div>

        <div class="input-group">
          <label class="input-label">CONFIRMAR CONTRASEÑA *</label>
          <input type="password" name="confirm_password" class="input-field" placeholder="••••••••" required autocomplete="new-password" />
        </div>

        <div class="security-note">
          🔒 Tus datos se almacenan de forma segura. Las contraseñas se guardan con bcrypt.
        </div>

        <button type="submit" class="btn-login" id="submitBtn">
          Crear Cuenta →
        </button>
      </form>

      <div class="footer-link">
        <p>
          ¿Ya tienes cuenta?
          <a href="/login-gym" id="linkLogin">Iniciar sesión</a>
        </p>
      </div>
    </div>
  </div>

  <script nonce="{{ request.state.csp_nonce }}">
    var params = new URLSearchParams(window.location.search);
    if (params.get('tipo') === 'gym') setTipo('gym');

    document.getElementById('btnGym').addEventListener('click', function() { setTipo('gym'); });
    document.getElementById('btnUsuario').addEventListener('click', function() { setTipo('usuario'); });

    function setTipo(tipo) {
      document.getElementById('campoTipo').value = tipo;
      var btnGym = document.getElementById('btnGym');
      var btnUser = document.getElementById('btnUsuario');
      var linkLogin = document.getElementById('linkLogin');
      btnGym.className  = 'tipo-btn' + (tipo === 'gym'     ? ' active-gym'     : '');
      btnUser.className = 'tipo-btn' + (tipo === 'usuario' ? ' active-usuario' : '');
      linkLogin.href = tipo === 'gym' ? '/login-gym' : '/login-usuario';
    }

    document.getElementById('registroForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var form = e.target;
      var errorMsg   = document.getElementById('errorMsg');
      var successMsg = document.getElementById('successMsg');
      var btn = document.getElementById('submitBtn');

      errorMsg.style.display   = 'none';
      successMsg.style.display = 'none';

      var pw1 = form.password.value;
      var pw2 = form.confirm_password.value;

      if (pw1 !== pw2) {
        errorMsg.textContent = 'Las contraseñas no coinciden.';
        errorMsg.style.display = 'block';
        return;
      }
      if (pw1.length < 6) {
        errorMsg.textContent = 'La contraseña debe tener al menos 6 caracteres.';
        errorMsg.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creando cuenta...';

      try {
        var res = await fetch('/api/auth/registro', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: form.email.value.trim(),
            password: pw1,
            nombre: form.nombre.value.trim(),
            apellido: form.apellido.value.trim(),
            tipo: form.tipo.value,
          }),
        });
        var data = await res.json();
        if (res.ok) {
          localStorage.setItem('mb_token', data.token);
          if (data.refresh_token) localStorage.setItem('mb_refresh_token', data.refresh_token);
          localStorage.setItem('mb_tipo', data.tipo);
          localStorage.setItem('mb_nombre', data.nombre);
          localStorage.setItem('mb_email', data.email);
          successMsg.textContent = '¡Cuenta creada! Redirigiendo...';
          successMsg.style.display = 'block';
          var dest = data.tipo === 'gym' ? '/configuracion' : '/mi-plan';
          setTimeout(function() { window.location.href = dest; }, 1200);
        } else {
          errorMsg.textContent = data.detail || 'Error al crear la cuenta.';
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.textContent = 'Error de conexión.';
        errorMsg.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Crear Cuenta →';
      }
    });
  </script>
</body>
</html>
