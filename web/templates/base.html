<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="csrf-token" content="{{ csrf_token(request) }}">
  <title>{% block title %}MetodoBase{% endblock %} — Método Base</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" crossorigin="anonymous" />

  <link rel="stylesheet" href="/static/css/styles.css?v={{ static_version }}" />

  <!-- Minimal overrides (avatar consistency) -->
  <style nonce="{{ request.state.csp_nonce }}">
    .avatar, .feed-avatar {
      border-color: var(--accent-purple);
    }
    .avatar svg, .feed-avatar svg {
      fill: var(--accent-purple);
    }
  </style>

  {% block head %}{% endblock %}
</head>
<body>

<!-- ── Auth Guard ─────────────────────────────────────────── -->
<script nonce="{{ request.state.csp_nonce }}" src="/static/js/auth-guard.js?v={{ static_version }}"></script>

<!-- ── Sidebar ────────────────────────────────────────────── -->
<aside class="sidebar" id="main-sidebar">
  <div class="sidebar-logo">
    <a href="/dashboard" class="sidebar-logo-link">
      <div class="sidebar-logo-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1A1400" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div>
        <span class="logo-text">Método Base</span>
        <p class="logo-subtitle">PLATAFORMA NUTRICIONAL</p>
      </div>
    </a>
  </div>

  <nav class="sidebar-nav">

    <span class="nav-section-label">General</span>

    <a href="/dashboard" class="nav-item" data-page="dashboard">
      <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M4 5a1 1 0 011-1h4a1 1 0 011 1v5a1 1 0 01-1 1H5a1 1 0 01-1-1V5zm10 0a1 1 0 011-1h4a1 1 0 011 1v2a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zm0 7a1 1 0 011-1h4a1 1 0 011 1v5a1 1 0 01-1 1h-4a1 1 0 01-1-1v-5zM4 14a1 1 0 011-1h4a1 1 0 011 1v5a1 1 0 01-1 1H5a1 1 0 01-1-1v-5z"/>
      </svg>
      Dashboard
    </a>

    <span class="nav-section-label mt-4">Gestión</span>

    <a href="/clientes" class="nav-item" data-page="clientes">
      <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
      Clientes
      <span class="nav-badge" id="sb-total-clientes"></span>
    </a>

    <!-- Generar Plan: oculto del sidebar (accesible vía Dashboard y rutas directas) -->

    <a href="/planes" class="nav-item" data-page="planes">
      <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
      </svg>
      Historial Planes
    </a>

    <a href="/suscripciones" class="nav-item" data-page="suscripciones" id="nav-suscripcion-link">
      <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/>
      </svg>
      Suscripción
    </a>
    <script nonce="{{ request.state.csp_nonce }}">
      (function() {
        const tipo = localStorage.getItem('mb_tipo') || '';
        if (tipo === 'usuario') {
          // Usuario individual: redirigir a su sección propia
          const gymPages = ['/dashboard', '/clientes', '/planes', '/suscripciones', '/configuracion', '/generar-plan'];
          const path = window.location.pathname;
          const isGymPage = gymPages.some(function(p) { return path === p || path.startsWith(p + '/'); });
          if (isGymPage) {
            window.location.replace('/mi-plan');
          }
        }
      })();
    </script>

    <a href="/configuracion" class="nav-item" data-page="configuracion">
      <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      Configuración
    </a>

  </nav>

  <!-- Quick action removed — accessible via Dashboard CTA and /generar-plan route -->

  <!-- Sidebar footer -->
  <div class="sidebar-footer">
    <div class="sidebar-footer-inner">
      <div class="sidebar-user-row">
        <div class="avatar avatar-sm" id="sb-avatar">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.2 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
        </div>
        <div class="sidebar-user-info">
          <p class="sidebar-user-name" id="sb-nombre">Cargando...</p>
          <p class="sidebar-user-role" id="sb-tipo">—</p>
        </div>
      </div>
      <button class="btn-logout" data-action="logout" id="btn-logout">
        <svg class="btn-logout-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Cerrar sesión
      </button>
    </div>
  </div>
</aside>

<!-- ── Mobile hamburger ───────────────────────────────────── -->
<button class="mobile-menu-btn" id="btn-hamburger" aria-label="Abrir menú">☰</button>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<!-- ── Main ───────────────────────────────────────────────── -->
<main class="main-content">
  {% block content %}{% endblock %}
</main>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Scripts globales -->
<script nonce="{{ request.state.csp_nonce }}" src="/static/js/api.js?v={{ static_version }}"></script>
<script nonce="{{ request.state.csp_nonce }}" src="/static/js/buttons.js?v={{ static_version }}"></script>
<script nonce="{{ request.state.csp_nonce }}" src="/static/js/components.js?v={{ static_version }}"></script>
<script nonce="{{ request.state.csp_nonce }}" src="/static/js/insights.js?v={{ static_version }}"></script>
<script nonce="{{ request.state.csp_nonce }}" src="/static/js/main.js?v={{ static_version }}"></script>

<script nonce="{{ request.state.csp_nonce }}">
  // Override avatar system — consistent SVG icon across all pages
  (function() {
    var SVG = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.2 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>';
    window.buildAvatar = function(name, size) {
      var w = document.createElement('div');
      w.className = size ? 'avatar avatar-' + size : 'avatar';
      w.innerHTML = SVG;
      return w;
    };
    // Patch any avatar/feed-avatar rendered by cached JS
    function patchAvatars() {
      document.querySelectorAll('.feed-avatar, .avatar').forEach(function(el) {
        if (!el.querySelector('svg') && el.tagName !== 'IMG') {
          el.textContent = '';
          el.innerHTML = SVG;
        }
      });
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function() { setTimeout(patchAvatars, 1200); });
    } else {
      setTimeout(patchAvatars, 1200);
    }
    new MutationObserver(function(mutations) {
      mutations.forEach(function(m) {
        m.addedNodes.forEach(function(n) {
          if (n.nodeType === 1) {
            var targets = [];
            if (n.classList && (n.classList.contains('feed-avatar') || n.classList.contains('avatar'))) targets.push(n);
            if (n.querySelectorAll) n.querySelectorAll('.feed-avatar, .avatar').forEach(function(el) { targets.push(el); });
            targets.forEach(function(el) {
              if (!el.querySelector('svg') && el.tagName !== 'IMG') {
                el.textContent = '';
                el.innerHTML = SVG;
              }
            });
          }
        });
      });
    }).observe(document.documentElement, { childList: true, subtree: true });
  })();
</script>

<script nonce="{{ request.state.csp_nonce }}">
  (function() {
    const nombre = localStorage.getItem('mb_nombre') || '';
    const tipo   = localStorage.getItem('mb_tipo')   || '—';
    const el_nombre = document.getElementById('sb-nombre');
    const el_tipo   = document.getElementById('sb-tipo');
    const el_avatar = document.getElementById('sb-avatar');
    if (el_nombre) el_nombre.textContent = nombre || 'Mi cuenta';
    if (el_tipo)   el_tipo.textContent = tipo === 'gym' ? 'Gym · Plan Activo' : 'Usuario';
    // Avatar is now an icon, no initials needed
  })();

  // Hamburger menu
  (function() {
    const btn = document.getElementById('btn-hamburger');
    const sidebar = document.getElementById('main-sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    if (btn && sidebar && overlay) {
      btn.addEventListener('click', () => {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('active');
      });
      overlay.addEventListener('click', () => {
        sidebar.classList.remove('open');
        overlay.classList.remove('active');
      });
    }
  })();

  // Sidebar client count
  (function() {
    const token = localStorage.getItem('mb_token');
    if (!token) return;
    const badge = document.getElementById('sb-total-clientes');
    if (!badge) return;
    fetch('/api/clientes?limite=1', {
      headers: { 'Authorization': 'Bearer ' + token }
    }).then(r => r.ok ? r.json() : null)
      .then(d => { if (d && d.total != null) badge.textContent = d.total; })
      .catch(() => {});
  })();
</script>

{% block scripts %}{% endblock %}

</body>
</html>
