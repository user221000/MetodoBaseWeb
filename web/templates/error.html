<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ code }} — Método Base</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .error-container {
      text-align: center;
      max-width: 480px;
      padding: 48px 32px;
    }
    .error-code {
      font-size: 7rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ff6b6b, #ffa06b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 12px;
    }
    .error-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: #f8fafc;
    }
    .error-desc {
      font-size: 1rem;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .error-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .error-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 0.92rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
      border: none;
    }
    .error-btn-primary {
      background: linear-gradient(135deg, #ff6b6b, #ff8e6b);
      color: #fff;
    }
    .error-btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(255, 107, 107, 0.3);
    }
    .error-btn-outline {
      background: rgba(255,255,255,0.06);
      color: #cbd5e1;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .error-btn-outline:hover {
      background: rgba(255,255,255,0.1);
      color: #f1f5f9;
    }
    .error-brand {
      margin-top: 48px;
      font-size: 0.82rem;
      color: #475569;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-code">{{ code }}</div>
    <h1 class="error-title">{{ title }}</h1>
    <p class="error-desc">{{ message }}</p>
    <div class="error-actions">
      <a href="/" class="error-btn error-btn-primary">← Ir al inicio</a>
      <button type="button" id="btn-back" class="error-btn error-btn-outline">Volver atrás</button>
    </div>
    <p class="error-brand">Método Base</p>
  </div>
  <script nonce="{{ request.state.csp_nonce }}">
    document.getElementById('btn-back').addEventListener('click', function() { history.back(); });
  </script>
</body>
</html>
